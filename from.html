<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>

    <h1><ul>Registration form</ul></h1>
    
        <label for="firstName" style="margin-right: 10px;color: green; padding: 5px;">First Name:</label>
        <input type="text" name="First Name" id="firstName" required>
        <br><br>

        <label for="lastName" style="margin-right: 12px;color: green; padding: 5px;">Last Name:</label>
        <input type="text" name="Last Name" id="lastName">
        <br><br>

        <label for="nickName" style="margin-right: 10px;color: green; padding: 5px;">Nick Name:</label>
        <input type="text" name="Nick Name" id="nickName">
        <br><br>

        <label for="email" style="margin-right: 45px;color: green; padding: 5px;">Email:</label>
        <input type="email" name="Email" id="email">
        <br><br>

        <label for="pass" style="margin-right: 25px;color: green; padding: 4px;">Password:</label>
        <input type="password" name="Password" id="pass">
        <br><br>

        <label for="date" style="margin-right: 10px;color: green; padding: 5px;">Date of Birth:</label>
        <input type="date" name="Date of Birth" id="date">
        <br><br>

        <label style="color: green; padding: 5px;">Gender:</label>
        <br>
        <label for="male" style="margin-right: 24px;color: blue; padding: 5px;">Male</label>
        <input type="radio" name="Gender" id="male" value="Male">
        <br>
        <label for="female" style="margin-right: 10px;color: blue; padding: 5px;">Female</label>
        <input type="radio" name="Gender" id="female" value="Female">
        <br>
        <label for="other" style="margin-right: 20px;color: blue; padding: 5px;">Other</label>
        <input type="radio" name="Gender" id="other" 
        value="Other">
        <br><br>
        <label for="mobile" style="margin-right: 10px;color: green; padding: 5px;">Mobile Number:</label>
        <input type="tel" name="Mobile Number" id="mobile" placeholder="0181........91">
        <br><br>
        <label for="address" style="margin-right: 20px;color: green; padding: 5px;">Address:</label>
        <br>
        <textarea name="Address" id="address" rows="7" cols="30" style="padding: 5px; color: red;"></textarea>
        <br><br>
        <!-- <button style="color:red;">Submit</button>
        <button style="color: blue;">Reset</button> -->
        <button style="color:red;margin-right: 50px;">Submit</button>
        <button style="color:blue;">Reset</button>




    </form>
</body>
</html>
